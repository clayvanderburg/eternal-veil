# ETERNAL VOID - NETLIFY CONFIGURATION FILE
# Enforces HTTP header policies for assets cache revalidation.
# Prevents browsers from combining cached old code with newly deployed releases.

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
